<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save the Date – Pascal wird 40</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0d0d0d;
      color: #e8dcc8;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Hintergrund-Partikel */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(180, 140, 60, 0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(180, 140, 60, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 680px;
      width: 100%;
      animation: fadeIn 1.6s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #b8922a;
      margin-bottom: 2rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.6rem auto;
      max-width: 300px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #b8922a, transparent);
    }

    .divider-diamond {
      width: 6px;
      height: 6px;
      background: #b8922a;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.5rem, 10vw, 6.5rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0.02em;
      color: #e8dcc8;
    }

    h1 em {
      font-style: italic;
      color: #c8a84b;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-style: italic;
      font-weight: 300;
      color: #a89070;
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    .date-block {
      margin: 2.5rem 0;
    }

    .date-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #e8dcc8;
    }

    .date-sub {
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #7a6a50;
      margin-top: 0.4rem;
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: clamp(1rem, 4vw, 2.5rem);
      margin: 2.5rem 0;
    }

    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 60px;
    }

    .countdown-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      font-weight: 300;
      line-height: 1;
      color: #c8a84b;
      min-width: 2ch;
      text-align: center;
    }

    .countdown-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #5a4a30;
      margin-top: 0.4rem;
    }

    .countdown-sep {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      color: #3a2a10;
      align-self: flex-start;
      padding-top: 0.1rem;
      line-height: 1;
    }

    .location {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a6a50;
      margin-top: 2rem;
    }

    .location span {
      color: #a89070;
    }

    .footer-note {
      margin-top: 3rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: #4a3a20;
      letter-spacing: 0.05em;
    }

    /* Rahmen-Deko */
    .frame {
      position: fixed;
      inset: 1.5rem;
      border: 1px solid rgba(184, 146, 42, 0.12);
      pointer-events: none;
      z-index: 0;
    }

    .frame::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(184, 146, 42, 0.05);
    }

    @media (max-width: 480px) {
      .frame { inset: 0.8rem; }
      .container { padding: 2rem 1.2rem; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="frame"></div>

  <div class="container">

    <p class="label">Save the Date</p>

    <p class="subtitle" style="margin-bottom:0.3rem;">Pascal</p>
    <h1><em>40</em></h1>
    <p class="subtitle">Birthday Bash</p>

    <div class="divider"><div class="divider-diamond"></div></div>

    <div class="date-block">
      <div class="date-main">03. Oktober 2026</div>
      <div class="date-sub">Samstag</div>
      <div class="date-sub" style="margin-top:0.3rem;">Tobelwiesstrasse 29 &nbsp;·&nbsp; Im Garten</div>
    </div>

    <div class="divider"><div class="divider-diamond"></div></div>

    <div class="countdown">
      <div class="countdown-item">
        <span class="countdown-number" id="days">--</span>
        <span class="countdown-label">Tage</span>
      </div>
      <div class="countdown-sep">·</div>
      <div class="countdown-item">
        <span class="countdown-number" id="hours">--</span>
        <span class="countdown-label">Stunden</span>
      </div>
      <div class="countdown-sep">·</div>
      <div class="countdown-item">
        <span class="countdown-number" id="minutes">--</span>
        <span class="countdown-label">Minuten</span>
      </div>
      <div class="countdown-sep">·</div>
      <div class="countdown-item">
        <span class="countdown-number" id="seconds">--</span>
        <span class="countdown-label">Sekunden</span>
      </div>
    </div>

    <p class="location">Mehr Details folgen</p>
    <p class="location" style="margin-top:0.5rem;"><span>Open from 2 pm till midnight</span></p>

    <p class="footer-note">Wir sehen uns.</p>

  </div>

  <script>
    const target = new Date('2026-10-03T18:00:00');

    function update() {
      const now = new Date();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('days').textContent = '0';
        document.getElementById('hours').textContent = '0';
        document.getElementById('minutes').textContent = '0';
        document.getElementById('seconds').textContent = '0';
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent    = String(d).padStart(2, '0');
      document.getElementById('hours').textContent   = String(h).padStart(2, '0');
      document.getElementById('minutes').textContent = String(m).padStart(2, '0');
      document.getElementById('seconds').textContent = String(s).padStart(2, '0');
    }

    update();
    setInterval(update, 1000);
  </script>

</body>
</html>
